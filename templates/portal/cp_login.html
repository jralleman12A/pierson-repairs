<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Client Portal — Pierson Repairs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a2744; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .login-logo .brand { font-size: 22px; font-weight: 800; color: #1a2744; }
        .login-logo .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
        .form-label { font-size: 12px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .4px; }
        .btn-login { background: #1a2744; color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 700; width: 100%; font-size: 14px; }
        .btn-login:hover { background: #243660; color: #fff; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="brand">Pierson Repairs</div>
        <div class="sub">Client Portal</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>
</div>
</body>
</html>
