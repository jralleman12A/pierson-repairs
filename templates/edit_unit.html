{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xxl-9 col-xl-10">
        <div class="card card-clean">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                    <div class="section-title mb-0">Edit Unit</div>
                    <a href="{{ url_for('unit_detail', unit_id=unit['id']) }}" class="btn btn-soft btn-sm">Back to Unit</a>
                </div>

                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="small-label">Intake ID</label>
                            <input type="text" class="form-control" name="intake_id" value="{{ unit['intake_id'] }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="small-label">Brand</label>
                            <input type="text" class="form-control" name="brand" value="{{ unit['brand'] or '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="small-label">Model</label>
                            <input type="text" class="form-control" name="model" value="{{ unit['model'] or '' }}">
                        </div>

                        <div class="col-md-4">
                            <label class="small-label">Serial Number</label>
                            <input type="text" class="form-control" name="serial_number" value="{{ unit['serial_number'] or '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="small-label">Screen Size</label>
                            <input type="text" class="form-control" name="screen_size" value="{{ unit['screen_size'] or '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="small-label">Source</label>
                            <input type="text" class="form-control" name="source" value="{{ unit['source'] or '' }}">
                        </div>

                        <div class="col-md-6">
                            <label class="small-label">Date Received</label>
                            <input type="date" class="form-control" name="date_received" value="{{ unit['date_received'] or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="small-label">Status</label>
                            <select class="form-select" name="status">
                                <option value="Awaiting Diagnosis" {% if unit["status"] == "Awaiting Diagnosis" %}selected{% endif %}>Awaiting Diagnosis</option>
                                <option value="In Repair" {% if unit["status"] == "In Repair" %}selected{% endif %}>In Repair</option>
                                <option value="Waiting on Parts" {% if unit["status"] == "Waiting on Parts" %}selected{% endif %}>Waiting on Parts</option>
                                <option value="Completed" {% if unit["status"] == "Completed" %}selected{% endif %}>Completed</option>
                                <option value="Shipped Back to MCPS" {% if unit["status"] == "Shipped Back to MCPS" %}selected{% endif %}>Shipped Back to MCPS</option>
                                <option value="Scrapped" {% if unit["status"] == "Scrapped" %}selected{% endif %}>Scrapped</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="small-label">Shipped Back to MCPS</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" name="shipped_back_mcps" id="shipped_back_mcps"
                                       {% if unit['shipped_back_mcps'] %}checked{% endif %}>
                                <label class="form-check-label" for="shipped_back_mcps">
                                    Yes, this panel was shipped back
                                </label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="small-label">MCPS Return Ship Date</label>
                            <input type="date" class="form-control" name="shipped_back_date"
                                   value="{{ unit['shipped_back_date'] or '' }}">
                        </div>

                        <div class="col-12">
                            <label class="small-label">Reported Issue</label>
                            <textarea class="form-control" name="reported_issue" rows="4">{{ unit['reported_issue'] or '' }}</textarea>
                        </div>

                        <div class="col-12">
                            <label class="small-label">Final Outcome</label>
                            <textarea class="form-control" name="final_outcome" rows="3">{{ unit['final_outcome'] or '' }}</textarea>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('unit_detail', unit_id=unit['id']) }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
